<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Пользователь — МоделМастер</title>
  <link rel="stylesheet" href="/assets/css/styles.css"/>
  <script src="/assets/js/api.js"></script>
</head>
<body>

<div class="ausr-page">
  <div class="ausr-card">

    <div class="ausr-header">
      <span class="ausr-header-title">Данные пользователя</span>
      <a class="ausr-close-btn" href="/admin/users" aria-label="Назад">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="1" y1="1" x2="17" y2="17" stroke="#000" stroke-width="1.2" stroke-linecap="round" stroke-opacity=".5"/>
          <line x1="17" y1="1" x2="1" y2="17" stroke="#000" stroke-width="1.2" stroke-linecap="round" stroke-opacity=".5"/>
        </svg>
      </a>
    </div>

    <div class="ausr-body">

      <div class="ausr-col-left">

        <div class="ausr-field-group">
          <label class="ausr-label">Имя</label>
          <input class="ausr-input" id="ausr-name" type="text" placeholder="Имя пользователя"/>
        </div>

        <div class="ausr-field-group">
          <label class="ausr-label">Email</label>
          <input class="ausr-input" id="ausr-email" type="email" placeholder="Email"/>
        </div>

        <div class="ausr-field-group">
          <label class="ausr-label">Телефон</label>
          <div class="ausr-phone-wrap">
            <div class="ausr-phone-prefix">
              <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
                <rect width="18" height="4.33" fill="white"/>
                <rect y="4.33" width="18" height="4.33" fill="#0039A6"/>
                <rect y="8.67" width="18" height="4.33" fill="#D52B1E"/>
              </svg>
              <span>+7</span>
            </div>
            <input class="ausr-input ausr-phone-input" id="ausr-phone" type="tel" placeholder="Телефон пользователя"/>
          </div>
        </div>

        <div class="ausr-section-block">
          <div class="ausr-section-label">Заказы</div>
          <div id="ausr-orders-info"><span style="opacity:.5">Загружаем…</span></div>
        </div>

        <div class="ausr-section-block">
          <div class="ausr-section-label">Статистика</div>
          <div id="ausr-stats"></div>
        </div>

        <button class="ausr-delete-btn" id="ausr-delete-btn">Удалить пользователя</button>

      </div>

      <div class="ausr-col-right">
        <div id="ausr-avatar" class="ausr-avatar">?</div>
        <div class="ausr-note-block">
          <div class="ausr-note-hdr">
            <span class="ausr-note-label">Внутренняя заметка</span>
            <button class="ausr-note-edit-btn" id="ausr-note-edit-btn">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M7 1L9 3L3 9H1V7L7 1Z" stroke="#333" stroke-width="1" stroke-linejoin="round" stroke-opacity=".5"/>
              </svg>
            </button>
          </div>
          <textarea class="ausr-note-textarea" id="ausr-note-textarea" disabled placeholder="Введите текст"></textarea>
        </div>
      </div>

    </div>

    <div class="ausr-footer">
      <a class="ausr-btn-cancel" href="/admin/users">Отмена</a>
      <button class="ausr-btn-save" id="ausr-save-btn">Сохранить</button>
    </div>

  </div>
</div>

<script>
  if (!isAuthenticated()) { window.location.href = '/'; }

  const AUSR_AVATAR_COLORS = ['#75BD93', '#AEBD75', '#BDA075', '#75A7BD'];
  function ausrAvatarColor(id) { return AUSR_AVATAR_COLORS[Number(id) % 4]; }

  function ausrFormatDate(dt) {
    if (!dt) return '—';
    let d = Array.isArray(dt)
      ? new Date(dt[0], dt[1]-1, dt[2], dt[3]||0, dt[4]||0)
      : new Date(String(dt).replace(/(\.\d{3})\d+/, '$1'));
    if (isNaN(d)) return '—';
    return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function getUserId() {
    const m = window.location.pathname.match(/\/admin\/users\/(\d+)/);
    return m ? m[1] : null;
  }

  const userId = getUserId();
  if (!userId) { window.location.href = '/admin/users'; }

  async function loadUser() {
    const r = await getAdminUser(userId);
    if (!r.success) {
      document.getElementById('ausr-orders-info').textContent = 'Не удалось загрузить данные пользователя.';
      return;
    }
    const u = r.data;

    document.title = `${u.name || 'Пользователь'} — МоделМастер`;

    document.getElementById('ausr-name').value  = u.name  || '';
    document.getElementById('ausr-email').value = u.email || '';

    // phone и username — если бэк их вернёт (после добавления в DTO)
    if (u.phone)    document.getElementById('ausr-phone').value = u.phone.replace(/^\+7/, '').trim();
    if (u.username) document.getElementById('ausr-name').placeholder = u.username;

    const avatar = document.getElementById('ausr-avatar');
    avatar.textContent = (u.name || '?')[0].toUpperCase();
    avatar.style.background = ausrAvatarColor(u.id);

    const noteTA = document.getElementById('ausr-note-textarea');
    noteTA.value = u.adminNote || '';
    noteTA.dataset.original = u.adminNote || '';

    document.getElementById('ausr-stats').innerHTML =
      `<div class="ausr-stat-row">Дата регистрации: ${ausrFormatDate(u.registeredAt)}</div>
       <div class="ausr-stat-row">Последний вход: ${ausrFormatDate(u.lastLoginAt)}</div>`;

    // заказы пользователя — фильтруем по email
    const ordersR = await getAdminOrders();
    if (ordersR.success) {
      console.log('[debug] user:', { username: u.username, email: u.email });
      if (ordersR.data.length > 0) {
        console.log('[debug] first order:', { customerUsername: ordersR.data[0].customerUsername, customerEmail: ordersR.data[0].customerEmail });
      }
      const userOrders = ordersR.data.filter(o =>
        (u.username && o.customerUsername === u.username) ||
        (u.email && o.customerEmail === u.email)
      );
      console.log('[debug] matched orders:', userOrders.length, 'of', ordersR.data.length);
      const count = userOrders.length;
      const noun = count === 1 ? 'заказ' : count < 5 ? 'заказа' : 'заказов';
      const recentHtml = userOrders.slice(0, 3).map(o => {
        const paid  = o.paymentStatus === 'PAID';
        const date  = ausrFormatDate(o.createdAt);
        const goods = (o.productIds || []).length;
        const goodsNoun = goods === 1 ? 'товар' : goods < 5 ? 'товара' : 'товаров';
        return `<div class="ausr-order-row">
          <a class="ausr-order-link" href="/admin/orders/${o.id}">№ ${o.id}</a>
          <span>, ${date}, ${goods} ${goodsNoun}, ${(o.totalAmount||0).toLocaleString('ru-RU')} р.,</span>
          <br><span>${paid ? 'Оплачено' : 'Не оплачено'}</span>
        </div>`;
      }).join('');

      document.getElementById('ausr-orders-info').innerHTML =
        `<div class="ausr-orders-count">Заказы: ${count}` +
        (count > 0 ? ` (<a class="ausr-orders-link" href="/admin/orders">перейти ко всем заказам пользователя</a>)` : '') +
        `</div>` +
        (count > 0 ? `<div class="ausr-orders-recent-label">Последние заказы</div>${recentHtml}` : '');
    } else {
      document.getElementById('ausr-orders-info').innerHTML = '<div class="ausr-orders-count">Заказы: 0</div>';
    }
  }

  // редактирование заметки
  document.getElementById('ausr-note-edit-btn').addEventListener('click', () => {
    const ta = document.getElementById('ausr-note-textarea');
    ta.disabled = false;
    ta.focus();
  });

  // сохранение
  document.getElementById('ausr-save-btn').addEventListener('click', async () => {
    const btn = document.getElementById('ausr-save-btn');
    btn.disabled = true;
    btn.textContent = 'Сохраняем…';

    const phoneRaw = document.getElementById('ausr-phone').value.trim();
    const data = {};
    const name  = document.getElementById('ausr-name').value.trim();
    const email = document.getElementById('ausr-email').value.trim();
    const note  = document.getElementById('ausr-note-textarea').value;
    if (name)      data.name      = name;
    if (email)     data.email     = email;
    if (phoneRaw)  data.phone     = '+7' + phoneRaw;
    if (note !== undefined) data.adminNote = note;

    const r = await updateAdminUser(userId, data);
    btn.disabled = false;
    if (r.success) {
      btn.textContent = 'Сохранено';
      setTimeout(() => { btn.textContent = 'Сохранить'; }, 1500);
    } else {
      btn.textContent = 'Ошибка';
      setTimeout(() => { btn.textContent = 'Сохранить'; }, 1500);
    }
  });

  // удаление
  document.getElementById('ausr-delete-btn').addEventListener('click', async () => {
    if (!confirm('Удалить пользователя? Это действие нельзя отменить.')) return;
    const r = await deleteAdminUser(userId);
    if (r.success) { window.location.href = '/admin/users'; }
    else { alert('Не удалось удалить пользователя'); }
  });

  document.addEventListener('DOMContentLoaded', loadUser);
</script>

</body>
</html>
