<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Заказ — МоделМастер</title>
  <link rel="stylesheet" href="/assets/css/styles.css"/>
  <script src="/assets/js/api.js"></script>
  <style>
    .order-detail-page {
      min-height: 100vh;
      background: #F5F5F5;
    }

    .od-breadcrumb {
      padding: 48px 140px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
    }
    .od-breadcrumb a { color: #000; text-decoration: none; }
    .od-breadcrumb .sep { color: #000; }
    .od-breadcrumb .current { color: #000; opacity: .5; }

    .od-content {
      padding: 0 140px 60px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* шапка заказа */
    .od-header-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }
    .od-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .od-order-num {
      font-size: 16px;
      font-weight: 600;
      color: #000;
    }
    .od-order-date {
      font-size: 16px;
      font-weight: 400;
      color: #000;
    }
    .od-repeat-btn {
      box-sizing: border-box;
      padding: 4px 14px;
      height: 33px;
      background: #fff;
      border: 1px solid #000;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .od-repeat-btn:hover { opacity: .7; }
    .od-repeat-btn:disabled { opacity: .4; cursor: default; }

    /* основная сетка */
    .od-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 10px;
      align-items: start;
    }
    .od-left { display: flex; flex-direction: column; gap: 10px; }

    /* карточки */
    .od-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 26px 24px;
    }
    .od-card-title {
      font-size: 16px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .02em;
      color: #000;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: none;
    }

    /* список товаров */
    .od-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .od-item:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .od-item-img {
      width: 50px;
      min-width: 50px;
      height: 50px;
      border-radius: 4px;
      background: #F8F8F8;
      object-fit: cover;
      margin-right: 14px;
      margin-top: 2px;
    }

    .od-item-info { flex: 1; min-width: 0; }
    .od-item-name {
      font-size: 16px;
      font-weight: 400;
      color: #000;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .od-item-meta {
      font-size: 12px;
      line-height: 18px;
      color: #000;
      opacity: .7;
    }

    .od-item-qty {
      min-width: 30px;
      text-align: center;
      font-size: 14px;
      color: #000;
      padding: 0 10px;
      align-self: center;
    }
    .od-item-price {
      min-width: 70px;
      text-align: right;
      font-size: 14px;
      color: #000;
      align-self: center;
      white-space: nowrap;
    }

    /* итог */
    .od-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,.08);
    }
    .od-total-label { font-size: 16px; font-weight: 700; color: #000; }
    .od-total-value { font-size: 16px; font-weight: 700; color: #000; }

    /* данные */
    .od-data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      line-height: 24px;
    }
    .od-data-label { font-size: 16px; color: #000; opacity: .5; min-width: 80px; }
    .od-data-value { font-size: 16px; color: #000; opacity: .8; text-align: right; }

    /* оплата */
    .od-pay-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      line-height: 24px;
    }
    .od-pay-label { font-size: 16px; color: #000; opacity: .5; }
    .od-pay-value { font-size: 16px; color: #000; opacity: .8; text-align: right; }
    .od-pay-total { font-size: 16px; color: #000; font-weight: 700; text-align: right; }

    /* назад */
    .od-back {
      margin-top: 8px;
    }
    .od-back a {
      font-size: 16px;
      color: #000;
      text-decoration: none;
      opacity: .7;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s;
    }
    .od-back a:hover { opacity: 1; }

    .od-loading {
      text-align: center;
      padding: 80px 0;
      color: #999;
      font-size: 18px;
    }
    .od-error {
      text-align: center;
      padding: 80px 0;
      color: #c0392b;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="order-detail-page">

  <div class="od-breadcrumb">
    <a href="/">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M13.6544 7.50982L6.82716 0L0 7.50982H1.73879V13.6542H11.9408V7.50982H13.6544ZM5.45106 9.55777H8.23342V13.6541H5.45106V9.55777Z" fill="black"/>
      </svg>
    </a>
    <span class="sep">/</span>
    <a href="/user/profile">Личный кабинет</a>
    <span class="sep">/</span>
    <a href="/user/orders">Мои заказы</a>
    <span class="sep">/</span>
    <span class="current" id="breadcrumb-order">Заказ</span>
  </div>

  <div class="od-content" id="od-content">
    <div class="od-loading">Загружаем заказ…</div>
  </div>

</div>

<script>
  if (!isAuthenticated()) { window.location.href = '/'; }

  const PRODUCT_IMAGE = {
    1: '/assets/images/service1.png',
    2: '/assets/images/service2.png',
    3: '/assets/images/service3.png'
  };

  const COLOR_LABEL = {
    WHITE:   'Белый',   BEIGE:  'Бежевый',   BROWN: 'Коричневый',
    GRAY:    'Серый',   BLACK:  'Чёрный',     BLUE:  'Синий',
    GREEN:   'Зелёный', RED:    'Красный',    ORANGE:'Оранжевый',
    COLORED: 'Цветной'
  };

  const SIZE_LABEL = {
    SMALL:  'Маленький (до 5×5×5)',
    MEDIUM: 'Средний (до 10×10×10)',
    BIG:    'Большой (до 20×20×20)',
    LARGE:  'Очень большой'
  };

  const PAYMENT_LABEL = { CARD: 'Картой', CASH: 'Наличными' };

  function getUserStatusLabel(order) {
    if (!order || order.paymentStatus === 'NOT_PAID') return 'Не оплачен';
    const map = {
      NEW:        'В обработке',
      IN_PROCESS: 'В процессе',
      DELIVERY:   'В доставке',
      DONE:       'Завершён',
      CANCEL:     'Отменён'
    };
    return map[order.status] || 'В обработке';
  }

  function getUserStatusColor(order) {
    if (!order || order.paymentStatus === 'NOT_PAID') return '#F6DDDD';
    const map = {
      NEW:        '#E4E5E5',
      IN_PROCESS: '#E4E5E5',
      DELIVERY:   '#EFDBFB',
      DONE:       '#DDF6E8',
      CANCEL:     '#F6DDDD'
    };
    return map[order.status] || '#E4E5E5';
  }

  function formatCreatedAt(createdAt) {
    if (!createdAt) return '';
    let date;
    if (Array.isArray(createdAt)) {
      date = new Date(createdAt[0], createdAt[1] - 1, createdAt[2], createdAt[3] || 0, createdAt[4] || 0);
    } else {
      date = new Date(createdAt);
    }
    if (isNaN(date)) return '';
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = date.getFullYear();
    const h = String(date.getHours()).padStart(2, '0');
    const min = String(date.getMinutes()).padStart(2, '0');
    return `${d}.${m}.${y} ${h}:${min}`;
  }

  function formatPrice(n) {
    return n.toLocaleString('ru-RU') + ' р.';
  }

  // id из пути /user/orders/17 или fallback ?id=X (Live Server)
  function getOrderId() {
    const match = window.location.pathname.match(/\/user\/orders\/(\d+)/);
    if (match) return match[1];
    return new URLSearchParams(window.location.search).get('id');
  }

  function renderOrder(order) {
    const statusLabel = getUserStatusLabel(order);
    const statusColor  = getUserStatusColor(order);
    const date = order.date || formatCreatedAt(order.createdAt);
    const payLabel = PAYMENT_LABEL[order.paymentMethod] || order.paymentMethod || '—';
    const user = order.user || {};

    // хлебная крошка и заголовок
    document.getElementById('breadcrumb-order').textContent = `Заказ №${order.id}`;
    document.title = `Заказ №${order.id} — МоделМастер`;

    // обновляем URL
    if (!window.location.pathname.match(/\/user\/orders\/\d+/)) {
      history.replaceState(null, '', `/user/orders/${order.id}`);
    }

    // товары
    const itemsHtml = (order.items || []).map(item => {
      const img = PRODUCT_IMAGE[item.productId] || '';
      const color = COLOR_LABEL[item.color] || item.color || '';
      const size  = SIZE_LABEL[item.size]   || item.size  || '';
      return `
        <div class="od-item">
          ${img
            ? `<img src="${img}" alt="${item.productName}" class="od-item-img" onerror="this.style.display='none'">`
            : `<div class="od-item-img"></div>`}
          <div class="od-item-info">
            <div class="od-item-name">${item.productName || '—'}</div>
            <div class="od-item-meta">
              ${color ? `Цвет: ${color}<br>` : ''}
              ${size  ? `Размер: ${size}<br>` : ''}
              ${item.comment ? `Комментарий: ${item.comment}` : ''}
            </div>
          </div>
          <div class="od-item-qty">${item.quantity}</div>
          <div class="od-item-price">${formatPrice(item.totalPrice)}</div>
        </div>`;
    }).join('');

    const content = document.getElementById('od-content');
    content.innerHTML = `
      <!-- шапка -->
      <div class="od-header-card">
        <div class="od-header-left">
          <span class="od-order-num">Заказ №${order.id}</span>
          <span class="od-order-date">${date}</span>
          <span class="pay-badge" style="background:${statusColor};padding:3px 10px;border-radius:4px;font-size:13px;">${statusLabel}</span>
        </div>
        <button class="od-repeat-btn" id="repeat-btn">Повторить заказ</button>
      </div>

      <!-- сетка -->
      <div class="od-grid">
        <div class="od-left">

          <!-- товары -->
          <div class="od-card">
            <div class="od-card-title">Товары</div>
            ${itemsHtml || '<p style="opacity:.5">Нет данных о товарах</p>'}
            <div class="od-total-row">
              <span class="od-total-label">Сумма заказа:</span>
              <span class="od-total-value">${formatPrice(order.totalAmount)}</span>
            </div>
          </div>

          <!-- данные покупателя -->
          <div class="od-card">
            <div class="od-card-title">Данные</div>
            <div class="od-data-row">
              <span class="od-data-label">Имя</span>
              <span class="od-data-value">${user.name || user.username || order.customerUsername || '—'}</span>
            </div>
            <div class="od-data-row">
              <span class="od-data-label">Email</span>
              <span class="od-data-value">${user.email || order.customerEmail || '—'}</span>
            </div>
            <div class="od-data-row">
              <span class="od-data-label">Телефон</span>
              <span class="od-data-value">${user.phone || '—'}</span>
            </div>
          </div>

        </div>

        <!-- оплата -->
        <div class="od-card">
          <div class="od-card-title">Оплата</div>
          <div class="od-pay-row">
            <span class="od-pay-label">Способ оплаты:</span>
            <span class="od-pay-value">${payLabel}</span>
          </div>
          <div class="od-pay-row" style="margin-top:8px">
            <span class="od-pay-label">Сумма заказа:</span>
            <span class="od-pay-total">${formatPrice(order.totalAmount)}</span>
          </div>
        </div>
      </div>

      <!-- назад -->
      <div class="od-back">
        <a href="/user/orders">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 13L5 8L10 3" stroke="#000" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Вернуться к списку заказов
        </a>
      </div>
    `;

    // кнопка "Повторить заказ"
    document.getElementById('repeat-btn')?.addEventListener('click', function () {
      if (!order.items || !order.items.length) {
        alert('Нет товаров для повтора заказа');
        return;
      }

      // пишем в localStorage (корзина работает через него)
      const cartItems = order.items.map(item => ({
        localId:      'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        productId:    item.productId,
        serviceName:  item.productName,
        image:        PRODUCT_IMAGE[item.productId] || '',
        description:  item.productDescription || '',
        colorEnum:    item.color   || null,
        colorLabel:   COLOR_LABEL[item.color]  || '',
        sizeEnum:     item.size    || null,
        sizeLabel:    SIZE_LABEL[item.size]    || '',
        qtyTierLabel: '',
        apiQty:       item.quantity,
        cartQty:      item.quantity,
        unitPrice:    item.totalPrice, // цена за всю позицию
        comment:      item.comment || ''
      }));

      localStorage.setItem(CART_KEY, JSON.stringify(cartItems));

      // открываем корзину прямо здесь
      openCartModal();
    });
  }

  async function loadOrderDetail() {
    const orderId = getOrderId();
    const content = document.getElementById('od-content');

    if (!orderId) {
      content.innerHTML = '<div class="od-error">Заказ не найден</div>';
      return;
    }

    try {
      const result = await getOrderDetails(orderId);
      if (result.success && result.data) {
        renderOrder(result.data);
      } else {
        content.innerHTML = `<div class="od-error">${result.message || 'Не удалось загрузить заказ'}</div>`;
      }
    } catch (e) {
      console.error('ошибка загрузки заказа:', e);
      content.innerHTML = '<div class="od-error">Ошибка загрузки</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', loadOrderDetail);
</script>


<!-- корзина (та же что на главной странице) -->
<div id="cart-overlay" class="cart-overlay" aria-hidden="true">
  <div class="cart-panel" id="cart-panel">
    <button class="cart-close-btn" id="cart-close-btn" aria-label="Закрыть корзину">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="1" y="1" width="26" height="26" rx="2" stroke="#222D38" stroke-width="1.5"/><line x1="9" y1="9" x2="19" y2="19" stroke="#222D38" stroke-width="1.5" stroke-linecap="round"/><line x1="19" y1="9" x2="9" y2="19" stroke="#222D38" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="cart-panel-header">
      <h2 class="cart-panel-title">Ваш заказ:</h2>
    </div>
    <div class="cart-items-list" id="cart-items-list"></div>
    <div class="cart-subtotal-row" id="cart-subtotal-row">
      <span class="cart-subtotal-label">Сумма:&nbsp;</span>
      <span class="cart-subtotal-label" id="cart-subtotal-amount">0</span>
      <span class="cart-subtotal-label">&nbsp;р.</span>
    </div>
    <div class="cart-form-section" id="cart-form-section">
      <div class="cart-auth-block">
        <div class="cart-auth-text">Вы авторизованы как <a href="/user/profile" class="cart-auth-link" id="cart-auth-username">—</a></div>
        <button class="cart-auth-logout-btn" id="cart-logout-btn">Выйти</button>
      </div>
      <div class="cart-field">
        <label class="cart-field-label" for="cart-name">Имя</label>
        <input class="cart-field-input" id="cart-name" type="text" placeholder="Ваше имя" autocomplete="name"/>
      </div>
      <div class="cart-field">
        <label class="cart-field-label" for="cart-email">Email</label>
        <input class="cart-field-input" id="cart-email" type="email" placeholder="Email для связи" autocomplete="email"/>
      </div>
      <div class="cart-field">
        <label class="cart-field-label" for="cart-phone">Номер телефона для связи</label>
        <div class="cart-phone-wrap">
          <div class="cart-phone-flag">
            <svg width="18" height="13" viewBox="0 0 18 13" fill="none"><rect width="18" height="4.33" fill="white"/><rect y="4.33" width="18" height="4.33" fill="#0039A6"/><rect y="8.67" width="18" height="4.33" fill="#D52B1E"/></svg>
            <span>+7</span>
          </div>
          <input class="cart-phone-input" id="cart-phone" type="tel" placeholder="(920) 655-24-60" autocomplete="tel-national"
                 oninput="this.value=this.value.replace(/^\+?7/,'').replace(/[^\d]/g,'').replace(/^(\d{10}).*/,'$1')"/>
        </div>
      </div>
      <div class="cart-payment-section">
        <p class="cart-payment-title">Способ оплаты</p>
        <div class="cart-payment-options">
          <label class="cart-payment-label"><input type="radio" name="cart-payment" value="CASH" checked> Наличными при получении</label>
          <label class="cart-payment-label"><input type="radio" name="cart-payment" value="CARD"> Безналичная оплата</label>
        </div>
      </div>
    </div>
    <div class="cart-total-row" id="cart-total-row">
      <span class="cart-total-label">Итоговая сумма:&nbsp;</span>
      <span class="cart-total-label" id="cart-total-amount">0</span>
      <span class="cart-total-label">&nbsp;р.</span>
    </div>
    <p class="cart-error" id="cart-error"></p>
    <button class="cart-submit-btn" id="cart-submit">ОФОРМИТЬ</button>
  </div>
</div>

<script>
  // корзина (localStorage)
  const CART_KEY = 'modelmaster_cart';

  function getLocalCart() {
    try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
    catch { return []; }
  }

  function saveLocalCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  function removeLocalCartItem(localId) {
    saveLocalCart(getLocalCart().filter(i => i.localId !== localId));
  }

  function updateLocalCartQty(localId, delta) {
    const cart = getLocalCart();
    const item = cart.find(i => i.localId === localId);
    if (item) item.cartQty = Math.max(1, item.cartQty + delta);
    saveLocalCart(cart);
  }

  function clearLocalCart() { localStorage.removeItem(CART_KEY); }

  function getCartTotal() {
    return getLocalCart().reduce((s, i) => s + i.unitPrice * i.cartQty, 0);
  }

  function openCartModal() {
    const overlay = document.getElementById('cart-overlay');
    if (!overlay) return;
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    renderCartModal();
    prefillCartForm();
    document.body.style.overflow = 'hidden';
  }

  function closeCartModal() {
    const overlay = document.getElementById('cart-overlay');
    if (!overlay) return;
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  function renderCartModal() {
    const list = document.getElementById('cart-items-list');
    if (!list) return;
    const cart = getLocalCart();
    const hasItems = cart.length > 0;

    ['cart-subtotal-row','cart-form-section','cart-total-row','cart-submit','cart-error'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = (hasItems || id === 'cart-error') ? '' : 'none';
    });

    if (!hasItems) {
      list.innerHTML = '<div class="cart-empty"><p>Корзина пуста</p></div>';
      return;
    }

    list.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-img-col">
          <img class="cart-item-img" src="${item.image}" alt="${item.serviceName}"
               onerror="this.style.background='#eee';this.removeAttribute('src')">
        </div>
        <div class="cart-item-info">
          <p class="cart-item-name">${item.serviceName}</p>
          <div class="cart-item-specs">
            ${item.colorLabel ? `<p>Цвет: ${item.colorLabel}</p>` : ''}
            ${item.cartQty ? `<p>Количество: ${item.cartQty} шт.</p>` : ''}
            ${item.sizeLabel ? `<p>Размер: ${item.sizeLabel}</p>` : ''}
          </div>
          ${item.description ? `<p class="cart-item-desc">${item.description}</p>` : ''}
        </div>
        <div class="cart-item-qty-col">
          <button class="cart-qty-btn" onclick="changeCartQty('${item.localId}',-1)" aria-label="Уменьшить">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7.5" stroke="#000" stroke-opacity=".4"/><line x1="5" y1="8" x2="11" y2="8" stroke="#000" stroke-opacity=".6" stroke-width="1.2"/></svg>
          </button>
          <span class="cart-qty-num">${item.cartQty}</span>
          <button class="cart-qty-btn" onclick="changeCartQty('${item.localId}',1)" aria-label="Увеличить">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7.5" stroke="#000" stroke-opacity=".4"/><line x1="5" y1="8" x2="11" y2="8" stroke="#000" stroke-opacity=".6" stroke-width="1.2"/><line x1="8" y1="5" x2="8" y2="11" stroke="#000" stroke-opacity=".6" stroke-width="1.2"/></svg>
          </button>
        </div>
        <div class="cart-item-price-col">
          <span class="cart-item-price">${item.unitPrice * item.cartQty}&nbsp;р.</span>
        </div>
        <div class="cart-item-remove-col">
          <button class="cart-item-remove" onclick="removeCartItemById('${item.localId}')" aria-label="Удалить">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9.5" stroke="#000" stroke-opacity=".4"/><line x1="6.5" y1="6.5" x2="13.5" y2="13.5" stroke="#000" stroke-opacity=".5" stroke-width="1.3"/><line x1="13.5" y1="6.5" x2="6.5" y2="13.5" stroke="#000" stroke-opacity=".5" stroke-width="1.3"/></svg>
          </button>
        </div>
      </div>
      <div class="cart-item-comment">
        <label class="cart-item-comment-label">Описание заказа</label>
        <input class="cart-item-comment-input" type="text"
               placeholder="Уточните детали заказа"
               value="${(item.comment || '').replace(/"/g, '&quot;')}"
               oninput="updateCartComment('${item.localId}', this.value)">
      </div>`).join('');

    const total = getCartTotal();
    const sub = document.getElementById('cart-subtotal-amount');
    const tot = document.getElementById('cart-total-amount');
    if (sub) sub.textContent = total;
    if (tot) tot.textContent = total;
  }

  function changeCartQty(localId, delta) { updateLocalCartQty(localId, delta); renderCartModal(); }
  function removeCartItemById(localId) { removeLocalCartItem(localId); renderCartModal(); }
  function updateCartComment(localId, comment) {
    const cart = getLocalCart();
    const item = cart.find(i => i.localId === localId);
    if (item) item.comment = comment;
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  async function prefillCartForm() {
    if (!isAuthenticated()) return;
    const login = sessionStorage.getItem('userLogin') || '';
    const usernameEl = document.getElementById('cart-auth-username');
    if (usernameEl) usernameEl.textContent = login;
    const result = await getUserProfile();
    if (!result.success) return;
    const d = result.data;
    const nameEl  = document.getElementById('cart-name');
    const emailEl = document.getElementById('cart-email');
    const phoneEl = document.getElementById('cart-phone');
    if (nameEl  && !nameEl.value)  nameEl.value  = d.name || d.username || '';
    if (emailEl && !emailEl.value) emailEl.value = d.email || '';
    if (phoneEl && !phoneEl.value) {
      let v = d.phone || '';
      if (v.startsWith('+7')) v = v.slice(2).trim();
      if (v.startsWith('7') && v.length === 11) v = v.slice(1);
      phoneEl.value = v;
    }
  }

  // события корзины
  document.getElementById('cart-overlay')?.addEventListener('click', e => {
    if (e.target === document.getElementById('cart-overlay')) closeCartModal();
  });
  document.getElementById('cart-close-btn')?.addEventListener('click', closeCartModal);
  document.getElementById('cart-logout-btn')?.addEventListener('click', () => {
    if (confirm('Вы уверены, что хотите выйти?')) logout();
  });

  // оформление заказа
  document.getElementById('cart-submit')?.addEventListener('click', async () => {
    const cart = getLocalCart();
    if (!cart.length) return;
    const btn   = document.getElementById('cart-submit');
    const errEl = document.getElementById('cart-error');
    btn.disabled = true;
    btn.textContent = 'Оформляем...';
    errEl.style.display = 'none';
    errEl.classList.remove('visible');
    try {
      for (const item of cart) {
        const r = await addToCart({
          productId: item.productId,
          quantity:  item.cartQty,
          size:      item.sizeEnum,
          color:     item.colorEnum,
          comment:   item.comment || ''
        });
        if (!r.success) throw new Error(r.message || 'Ошибка добавления в корзину');
      }
      const paymentMethod = document.querySelector('input[name="cart-payment"]:checked')?.value || 'CASH';
      const contactName   = document.getElementById('cart-name')?.value?.trim()  || '';
      const contactEmail  = document.getElementById('cart-email')?.value?.trim() || '';
      const contactPhone  = document.getElementById('cart-phone')?.value?.trim() || '';
      const orderResult = await checkout({ paymentMethod, contactName, contactEmail, contactPhone });
      if (!orderResult.success) throw new Error(orderResult.message || 'Ошибка оформления заказа');
      const orderId = orderResult.data?.id;
      if (orderId) localStorage.setItem('order_items_' + orderId, JSON.stringify(cart));
      clearLocalCart();
      closeCartModal();
      window.location.href = '/user/profile';
    } catch (err) {
      errEl.textContent = err.message || 'Что-то пошло не так. Попробуйте ещё раз.';
      errEl.classList.add('visible');
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ОФОРМИТЬ';
    }
  });
</script>
</body>
</html>
