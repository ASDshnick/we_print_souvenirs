<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Редактирование профиля — МоделМастер</title>
  <link rel="stylesheet" href="/assets/css/styles.css"/>
  <script src="/assets/js/api.js"></script>
</head>
<body>

<!-- шапка -->
<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g clip-path="url(#clip0_9_839)">

            <path d="M20.749 3.25498C22.5466 5.05261 20.0886 10.4252 15.2588 15.255C10.429 20.0847 5.05644 22.5428 3.2588 20.7451C1.46117 18.9475 3.91921 13.5749 8.74898 8.74516C13.5788 3.91539 18.9513 1.45735 20.749 3.25498Z" stroke="#333333" stroke-width="1.8"/>
          </g>
          <defs>
            <clipPath id="clip0_9_839">
              <rect width="24" height="24" fill="white"/>
            </clipPath>
          </defs>
        </svg>
      </div>
      <span class="logo-text">МОДЕЛМАСТЕР</span>
    </a>
    <nav class="header-nav">
      <a href="index.html#about">О мастере</a>
      <a href="index.html#work-types">Виды работ</a>
      <a href="index.html#contacts">Контакты</a>
    </nav>
    <div class="header-right">
      <div class="header-icons">
        <div class="header-profile-wrap">
          <button id="profile-button" class="icon-btn" aria-label="Профиль">
            <svg width="19" height="19" viewBox="0 0 19 19" fill="none">
              <path d="M9.49996 9.50003C11.4078 9.50003 12.9545 7.95338 12.9545 6.04549C12.9545 4.13759 11.4078 2.59094 9.49996 2.59094C7.59206 2.59094 6.04541 4.13759 6.04541 6.04549C6.04541 7.95338 7.59206 9.50003 9.49996 9.50003Z" stroke="black" stroke-width="1.72727"/>
              <path d="M16.409 17.2728C16.409 14.4109 13.3157 12.0909 9.49991 12.0909C5.68412 12.0909 2.59082 14.4109 2.59082 17.2728" stroke="black" stroke-width="1.72727" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="profile-menu" id="profile-menu">
            <div class="profile-menu-top">
              <div class="profile-menu-user">
                <span class="profile-menu-name" id="menu-username">—</span>
                <a href="/user/profile" class="profile-menu-edit">Редактировать профиль</a>
              </div>
              <button class="profile-menu-logout" id="menu-logout-btn" aria-label="Выйти">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <polyline points="16 17 21 12 16 7" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="21" y1="12" x2="9" y2="12" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <div class="profile-menu-links">
              <a href="/user/profile">Личный кабинет</a>
              <a href="/user/profile">Мои заказы</a>
            </div>
          </div>
        </div>
        <button class="icon-btn" aria-label="Корзина">
          <svg width="19" height="19" viewBox="0 0 19 19" fill="none">
            <g clip-path="url(#clip0_9_870)">
              <path d="M3.17817 5.96787C3.21829 5.52274 3.59139 5.18176 4.03832 5.18176H14.9619C15.4088 5.18176 15.7819 5.52274 15.822 5.96787L16.7562 16.3315C16.8017 16.8371 16.4036 17.2727 15.896 17.2727H3.10418C2.5966 17.2727 2.19847 16.8371 2.24403 16.3315L3.17817 5.96787Z" stroke="black" stroke-width="1.55455"/>
              <path d="M12.9545 7.77274V4.31819C12.9545 2.4103 11.4078 0.863647 9.49996 0.863647C7.59206 0.863647 6.04541 2.4103 6.04541 4.31819V7.77274" stroke="black" stroke-width="1.59773"/>
            </g>

      </div>
      <button class="btn-cta">Сделать заказ</button>
    </div>
  </div>
</header>

<!-- страница редактирования профиля -->
<div class="edit-profile-page">

  <!-- хлебные крошки -->
  <nav class="ep-breadcrumb">
    <a href="/" aria-label="Главная">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M13.6544 7.50982L6.82716 0L0 7.50982H1.73879V13.6542H11.9408V7.50982H13.6544ZM5.45106 9.55777H8.23342V13.6541H5.45106V9.55777Z" fill="black"/>
      </svg>
    </a>
    <span class="sep">/</span>
    <a href="/user/profile">Личный кабинет</a>
    <span class="sep">/</span>
    <span class="current">Профиль</span>
  </nav>

  <!-- карточка редактирования -->
  <div class="ep-card">
    <h2 class="ep-card-title">Профиль</h2>

    <div class="ep-body">

      <!-- форма -->
      <div class="ep-form-col">
        <form class="ep-form" id="profile-form">
          <div class="ep-fields">

            <!-- поле имя -->
            <div class="ep-field">
              <label class="ep-label" for="ep-name">Имя</label>
              <input class="ep-input" id="ep-name" type="text" name="name" placeholder="Ваше имя" autocomplete="name"/>
              <span class="field-error" id="ep-name-error"></span>
            </div>

            <!-- поле email -->
            <div class="ep-field">
              <label class="ep-label" for="ep-email">Email</label>
              <input class="ep-input" id="ep-email" type="email" name="email" placeholder="your@email.com" autocomplete="email"/>
            </div>

            <!-- поле телефон -->
            <div class="ep-field">
              <label class="ep-label" for="ep-phone">Телефон</label>
              <div class="ep-phone-wrap">
                <div class="ep-phone-flag">
                  <!-- флаг  -->
                  <svg width="18" height="13" viewBox="0 0 18 13" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="18" height="4.33" fill="white"/>
                    <rect y="4.33" width="18" height="4.33" fill="#0039A6"/>
                    <rect y="8.67" width="18" height="4.33" fill="#D52B1E"/>
                  </svg>
                  <span>+7</span>
                </div>
                <input class="ep-phone-input" id="ep-phone" type="tel" name="phone" placeholder="(900) 000-00-00" autocomplete="tel"/>
              </div>
            </div>

            <!-- поле пароль -->
            <div class="ep-field ep-field-password">
              <label class="ep-label-password">Пароль</label>
              <button type="button" class="ep-change-password-btn" id="change-password-btn">
                Изменить пароль
              </button>
            </div>

          </div>

          <!-- кнопка сохранить -->
          <button type="submit" class="ep-save-btn">Сохранить</button>
        </form>
      </div>

      <!-- аватар -->
      <div class="ep-avatar-col">
        <p class="ep-avatar-label">Изображение профиля</p>
        <div class="ep-avatar-wrap">
          <div class="ep-avatar-circle" id="avatar-preview">
            <!-- Иконка пользователя -->
            <svg width="30" height="34" viewBox="0 0 30 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 15.5C18.866 15.5 22 12.366 22 8.5C22 4.634 18.866 1.5 15 1.5C11.134 1.5 8 4.634 8 8.5C8 12.366 11.134 15.5 15 15.5Z" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M1 32C1 25.373 7.268 20 15 20C22.732 20 29 25.373 29 32" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <button type="button" class="ep-avatar-edit-btn" id="avatar-upload-btn">
            Редактировать
          </button>
          <input type="file" id="avatar-file-input" accept="image/*" style="display:none"/>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  window.onerror = function(msg, src, line, col, err) {
    console.error('js ошибка:', msg, 'строка:', line, err);
  };

  document.addEventListener('DOMContentLoaded', function () {

    try {
      if (!isAuthenticated()) { window.location.href = '/'; return; }
    } catch (e) {
      console.error('api.js не загружен:', e); return;
    }

    function setPageUrl(url) {
      if (window.location.port === '5500' || window.location.port === '5501') return;
      history.replaceState(null, '', url);
    }
    setPageUrl('/user/change-data');

    // загрузка данных профиля
    async function loadProfileData() {
      try {
        const result = await getUserProfile();
        if (result.success) {
          const d = result.data;
          const n = document.getElementById('ep-name');
          const em = document.getElementById('ep-email');
          const ph = document.getElementById('ep-phone');
          const mu = document.getElementById('menu-username');
          if (n)  n.value  = d.name || d.username || d.login || '';
          if (em) em.value = d.email || '';
          if (ph) ph.value = d.phone || '';
          if (mu) mu.textContent = d.name || d.username || '-';
        } else {
          window.location.href = '/';
        }
      } catch (e) {
        console.error('ошибка загрузки профиля:', e);
      }
    }
    loadProfileData();

    // сохранение профиля
    document.getElementById('profile-form')?.addEventListener('submit', async function (e) {
      e.preventDefault();
      const name  = document.getElementById('ep-name')?.value.trim() || '';
      const email = document.getElementById('ep-email')?.value.trim() || '';
      const phone = document.getElementById('ep-phone')?.value.trim() || '';
      const btn   = e.target.querySelector('button[type="submit"]');
      if (btn) { btn.disabled = true; btn.textContent = 'Сохраняем...'; }
      try {
        const result = await changeUserData({ name, email, phone });
        if (result.success) {
          window.location.href = '/user/profile';
        } else {
          alert('Ошибка: ' + (result.message || 'неизвестная ошибка'));
          if (btn) { btn.disabled = false; btn.textContent = 'Сохранить'; }
        }
      } catch (err) {
        console.error('ошибка сохранения:', err);
        alert('Ошибка: ' + err.message);
        if (btn) { btn.disabled = false; btn.textContent = 'Сохранить'; }
      }
    });

    // попап смены пароля
    const overlay = document.getElementById('password-popup-overlay');
    const ppError = document.getElementById('pp-error');
    const ppOld   = document.getElementById('pp-old');
    const ppNew   = document.getElementById('pp-new');

    document.getElementById('change-password-btn')?.addEventListener('click', function () {
      if (ppOld) ppOld.value = '';
      if (ppNew) ppNew.value = '';
      if (ppError) ppError.classList.remove('visible');
      if (overlay) overlay.classList.add('active');
    });

    document.getElementById('pp-cancel')?.addEventListener('click', function () {
      if (overlay) overlay.classList.remove('active');
    });

    overlay?.addEventListener('click', function (e) {
      if (e.target === overlay) overlay.classList.remove('active');
    });

    document.getElementById('pp-save')?.addEventListener('click', async function () {
      const oldPass = ppOld ? ppOld.value : '';
      const newPass = ppNew ? ppNew.value : '';
      if (!oldPass) {
        if (ppError) { ppError.textContent = 'введите старый пароль'; ppError.classList.add('visible'); }
        return;
      }
      if (newPass.length < 5) {
        if (ppError) { ppError.textContent = 'минимум 5 символов'; ppError.classList.add('visible'); }
        return;
      }
      const saveBtn = document.getElementById('pp-save');
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Сохраняем...'; }
      try {
        const result = await changePassword({ oldPassword: oldPass, newPassword: newPass });
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Сохранить'; }
        if (result.success) {
          if (overlay) overlay.classList.remove('active');
          alert('Пароль успешно изменён!');
        } else {
          if (ppError) { ppError.textContent = result.message || 'ошибка'; ppError.classList.add('visible'); }
        }
      } catch (err) {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Сохранить'; }
        console.error('ошибка смены пароля:', err);
      }
    });

    // аватар
    document.getElementById('avatar-upload-btn')?.addEventListener('click', function () {
      document.getElementById('avatar-file-input')?.click();
    });
    document.getElementById('avatar-file-input')?.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (ev) {
        const circle = document.getElementById('avatar-preview');
        if (circle) circle.innerHTML = '<img src="' + ev.target.result + '" class="avatar-img-small" alt="аватар"/>';
        localStorage.setItem('userAvatar', ev.target.result);
      };
      reader.readAsDataURL(file);
    });

    // меню профиля в шапке
    const profileButton = document.getElementById('profile-button');
    const profileMenu   = document.getElementById('profile-menu');
    const menuLogoutBtn = document.getElementById('menu-logout-btn');
    profileButton?.addEventListener('click', function (e) {
      e.stopPropagation();
      profileMenu?.classList.toggle('open');
    });
    document.addEventListener('click', function (e) {
      if (profileMenu && !profileMenu.contains(e.target) && !profileButton?.contains(e.target)) {
        profileMenu.classList.remove('open');
      }
    });
    menuLogoutBtn?.addEventListener('click', function () {
      if (confirm('вы уверены, что хотите выйти?')) logout();
    });

  }); // domcontentloaded
</script>

<!-- попап смены пароля -->
<div class="password-popup-overlay" id="password-popup-overlay">
  <div class="password-popup">
    <h3>Смена пароля</h3>
    <div class="pp-field">
      <label for="pp-old">Старый пароль</label>
      <input type="password" id="pp-old" placeholder="Введите старый пароль"/>
    </div>
    <div class="pp-field">
      <label for="pp-new">Новый пароль</label>
      <input type="password" id="pp-new" placeholder="Минимум 5 символов"/>
    </div>
    <div class="pp-error" id="pp-error"></div>
    <div class="pp-actions">
      <button class="pp-btn-cancel" id="pp-cancel">Отмена</button>
      <button class="pp-btn-save" id="pp-save">Сохранить</button>
    </div>
  </div>
</div>

</body>
</html>
